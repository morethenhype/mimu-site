<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MIMU // Countdown Gateway</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-0: #000a05;
        --bg-1: #010302;
        --bg-2: #04130d;
        --bg-3: #082117;
        --green: #78ffbf;
        --green-dim: #3dcc88;
        --green-soft: #d3ffe8;
        --muted: rgba(211, 255, 232, 0.52);
        --muted-hi: rgba(211, 255, 232, 0.72);
        --line: rgba(120, 255, 191, 0.13);
        --line-hi: rgba(120, 255, 191, 0.22);
        --panel: rgba(4, 14, 10, 0.85);
        --font-mono: 'Share Tech Mono', monospace;
        --font-display: 'Bebas Neue', sans-serif;
        --font-body: 'DM Sans', sans-serif;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%;
        min-height: 100%;
        font-family: var(--font-body);
        color: var(--green-soft);
        background: var(--bg-0);
        overflow-x: hidden;
      }

      /* Scanlines */
      body::after {
        content: "";
        position: fixed; inset: 0;
        background: repeating-linear-gradient(
          0deg, transparent, transparent 3px,
          rgba(0,0,0,0.18) 3px, rgba(0,0,0,0.18) 4px
        );
        pointer-events: none;
        z-index: 1000; opacity: 0.45;
      }

      /* Noise grain */
      body::before {
        content: "";
        position: fixed; inset: -50%;
        width: 200%; height: 200%;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
        opacity: 0.028; pointer-events: none;
        animation: grain 0.8s steps(1) infinite; z-index: 999;
      }

      @keyframes grain {
        0%   { transform: translate(0,0); }
        10%  { transform: translate(-3%,-4%); }
        20%  { transform: translate(-6%,2%); }
        30%  { transform: translate(3%,-1%); }
        40%  { transform: translate(-1%,5%); }
        50%  { transform: translate(-5%,1%); }
        60%  { transform: translate(2%,-4%); }
        70%  { transform: translate(-2%,6%); }
        80%  { transform: translate(4%,3%); }
        90%  { transform: translate(-3%,-3%); }
        100% { transform: translate(0,0); }
      }

      /* Page */
      .page {
        min-height: 100vh; padding: 20px;
        display: flex; align-items: center; justify-content: center;
        background:
          radial-gradient(ellipse 60% 40% at 50% -10%, rgba(120,255,191,0.09) 0%, transparent 70%),
          radial-gradient(ellipse 40% 30% at 15% 85%, rgba(120,255,191,0.06) 0%, transparent 60%),
          radial-gradient(ellipse 30% 20% at 85% 75%, rgba(120,255,191,0.05) 0%, transparent 50%),
          linear-gradient(170deg, var(--bg-3) 0%, var(--bg-2) 35%, var(--bg-1) 70%, var(--bg-0) 100%);
      }

      /* Shell */
      .shell {
        width: min(1340px, 100%);
        min-height: calc(100vh - 40px);
        border-radius: 24px;
        border: 1px solid var(--line);
        background: linear-gradient(170deg,
          rgba(5,18,12,0.97) 0%,
          rgba(2,9,6,0.96) 50%,
          rgba(1,5,3,0.97) 100%
        );
        overflow: hidden; position: relative;
        display: flex; flex-direction: column;
        animation: shellIn 1s ease both;
      }

      @keyframes shellIn {
        from { opacity: 0; transform: scale(0.985) translateY(12px); }
        to   { opacity: 1; transform: none; }
      }

      .shell::before {
        content: ""; position: absolute; inset: 1px;
        border-radius: 23px;
        border: 1px solid rgba(120,255,191,0.06);
        pointer-events: none; z-index: 1;
      }

      .shell::after {
        content: ""; position: absolute; top: 0; left: 0;
        width: 320px; height: 320px;
        background: radial-gradient(circle at top left, rgba(120,255,191,0.06), transparent 65%);
        pointer-events: none; z-index: 0;
      }

      /* Grid bg */
      .grid-bg {
        position: absolute; inset: 0;
        background-image:
          linear-gradient(rgba(120,255,191,0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(120,255,191,0.035) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, black 10%, transparent 80%);
        pointer-events: none; z-index: 0;
      }

      /* ── Topbar ── */
      .topbar {
        position: relative; z-index: 10;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px; padding: 18px 28px;
        border-bottom: 1px solid var(--line);
        background: rgba(2,10,6,0.7);
        backdrop-filter: blur(6px);
        animation: barIn 0.8s 0.2s ease both;
      }

      @keyframes barIn {
        from { opacity: 0; transform: translateY(-8px); }
        to   { opacity: 1; transform: none; }
      }

      .topbar-left {
        display: flex; align-items: center; gap: 16px;
      }

      /* Burger button */
      .burger {
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        gap: 5px; width: 36px; height: 36px;
        cursor: pointer; flex-shrink: 0;
        border: 1px solid var(--line-hi);
        border-radius: 8px;
        background: rgba(6,18,12,0.6);
        transition: border-color 0.2s, background 0.2s;
        padding: 0;
      }

      .burger:hover {
        border-color: rgba(120,255,191,0.35);
        background: rgba(14,40,26,0.7);
      }

      .burger span {
        display: block;
        width: 16px; height: 1.5px;
        background: var(--green);
        border-radius: 2px;
        transition: all 0.3s ease;
        box-shadow: 0 0 4px rgba(120,255,191,0.4);
      }

      .burger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
      .burger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
      .burger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

      .brand {
        display: flex; align-items: center; gap: 10px;
        font-family: var(--font-mono);
        font-size: 11px; letter-spacing: 0.18em; color: var(--muted);
      }

      .brand-logo {
        font-family: var(--font-display);
        font-size: 22px; letter-spacing: 0.12em;
        color: var(--green); line-height: 1;
        text-shadow: 0 0 16px rgba(120,255,191,0.5);
      }

      .brand-sep { width: 1px; height: 16px; background: var(--line-hi); margin: 0 4px; }

      .pulse-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 10px rgba(120,255,191,0.9), 0 0 20px rgba(120,255,191,0.4);
        animation: pulse 2.4s ease-in-out infinite; flex-shrink: 0;
      }

      @keyframes pulse {
        0%,100% { opacity:1; box-shadow: 0 0 10px rgba(120,255,191,0.9), 0 0 20px rgba(120,255,191,0.4); }
        50%      { opacity:0.5; box-shadow: 0 0 4px rgba(120,255,191,0.4); }
      }

      .status-tag {
        font-family: var(--font-mono); font-size: 10px;
        letter-spacing: 0.22em; color: var(--muted);
        text-transform: uppercase;
        display: flex; align-items: center; gap: 8px;
      }

      .status-tag::before {
        content: ""; display: block; width: 5px; height: 5px;
        border-radius: 50%; background: var(--green-dim);
        box-shadow: 0 0 6px var(--green-dim);
        animation: pulse 3s 1s ease-in-out infinite;
      }

      /* ── Dropdown menu ── */
      .nav-menu {
        position: absolute;
        top: calc(100% + 8px);
        left: 20px;
        width: 260px;
        border: 1px solid var(--line-hi);
        border-radius: 16px;
        background: rgba(2,10,6,0.96);
        backdrop-filter: blur(16px);
        overflow: hidden;
        z-index: 100;
        transform-origin: top left;
        transform: scale(0.95) translateY(-8px);
        opacity: 0;
        pointer-events: none;
        transition: transform 0.25s cubic-bezier(0.16,1,0.3,1), opacity 0.2s ease;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 30px rgba(120,255,191,0.06);
      }

      .nav-menu.open {
        transform: none;
        opacity: 1;
        pointer-events: all;
      }

      .nav-menu::before {
        content: ""; position: absolute;
        top: 0; left: 10%; right: 10%; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(120,255,191,0.3), transparent);
      }

      .nav-label {
        font-family: var(--font-mono); font-size: 9px;
        letter-spacing: 0.3em; text-transform: uppercase;
        color: rgba(211,255,232,0.28); padding: 14px 18px 8px;
      }

      .nav-item {
        display: flex; align-items: center; gap: 12px;
        padding: 12px 18px; cursor: pointer;
        font-family: var(--font-mono); font-size: 10.5px;
        letter-spacing: 0.2em; text-transform: uppercase;
        color: var(--muted-hi); text-decoration: none;
        transition: background 0.15s, color 0.15s;
        border: none; background: none; width: 100%; text-align: left;
      }

      .nav-item:hover:not(.nav-item-locked) {
        background: rgba(120,255,191,0.06);
        color: var(--green-soft);
      }

      .nav-item + .nav-item { border-top: 1px solid var(--line); }

      .nav-item-locked {
        opacity: 0.38; cursor: not-allowed;
      }

      .nav-item-icon {
        width: 18px; height: 18px; flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        font-size: 12px;
      }

      .nav-lock-badge {
        margin-left: auto;
        font-family: var(--font-mono); font-size: 8px;
        letter-spacing: 0.18em; text-transform: uppercase;
        color: rgba(211,255,232,0.25);
        border: 1px solid rgba(211,255,232,0.12);
        border-radius: 999px; padding: 2px 7px;
      }

      /* ── Hero ── */
      .hero {
        flex: 1; display: grid;
        place-items: center;
        padding: 40px 24px 48px;
        position: relative; z-index: 2;
      }

      .center {
        width: min(960px, 100%);
        text-align: center;
        display: flex; flex-direction: column;
        align-items: center; gap: 0;
      }

      .eyebrow {
        font-family: var(--font-mono); font-size: 10.5px;
        letter-spacing: 0.36em; text-transform: uppercase;
        color: var(--muted); margin-bottom: 20px;
        animation: fadeUp 0.7s 0.5s ease both;
        display: flex; align-items: center; gap: 12px;
      }

      .eyebrow::before, .eyebrow::after {
        content: ""; display: block; height: 1px; width: 40px;
        background: linear-gradient(90deg, transparent, var(--line-hi));
      }
      .eyebrow::after { background: linear-gradient(270deg, transparent, var(--line-hi)); }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: none; }
      }

      .hero-title {
        font-family: var(--font-display);
        font-size: clamp(5.5rem, 14vw, 11.5rem);
        line-height: 0.88; letter-spacing: 0.06em;
        text-transform: uppercase; margin-bottom: 10px;
        background: linear-gradient(170deg, #fff 0%, var(--green-soft) 40%, var(--green) 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 0 28px rgba(120,255,191,0.18));
        animation: titleIn 0.9s 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      @keyframes titleIn {
        from { opacity: 0; transform: translateY(32px) scaleY(0.92); }
        to   { opacity: 1; transform: none; }
      }

      .hero-subtitle {
        font-family: var(--font-display);
        font-size: clamp(1.4rem, 3.2vw, 2.6rem);
        letter-spacing: 0.28em; color: var(--green-dim);
        text-transform: uppercase; margin-bottom: 36px;
        animation: fadeUp 0.7s 0.8s ease both;
        text-shadow: 0 0 16px rgba(61,204,136,0.4);
      }

      .divider {
        width: 100%; max-width: 560px; height: 1px;
        background: linear-gradient(90deg, transparent, var(--line-hi) 20%, var(--green) 50%, var(--line-hi) 80%, transparent);
        margin-bottom: 32px;
        animation: fadeUp 0.6s 0.9s ease both;
      }

      /* Countdown */
      .countdown-wrap {
        width: min(860px, 100%); margin-bottom: 32px;
        padding: 28px 28px 24px; border-radius: 20px;
        border: 1px solid var(--line-hi);
        background: linear-gradient(160deg, rgba(10,28,20,0.9) 0%, rgba(4,14,10,0.88) 100%);
        position: relative; overflow: hidden;
        animation: fadeUp 0.8s 1s ease both;
      }

      .countdown-wrap::before {
        content: ""; position: absolute; top: 0; left: 0;
        width: 80px; height: 80px;
        background: radial-gradient(circle at top left, rgba(120,255,191,0.08), transparent 70%);
        pointer-events: none;
      }

      .countdown-label {
        font-family: var(--font-mono); font-size: 10px;
        letter-spacing: 0.32em; text-transform: uppercase;
        color: var(--muted); margin-bottom: 20px;
        display: flex; align-items: center; justify-content: center; gap: 10px;
      }

      .countdown-label::before, .countdown-label::after {
        content: ""; display: block; height: 1px; width: 28px;
        background: var(--line-hi);
      }

      .countdown {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }

      .time-box {
        border: 1px solid var(--line); border-radius: 16px;
        background: linear-gradient(160deg, rgba(8,24,16,0.7), rgba(2,10,6,0.8));
        padding: 28px 10px 20px; position: relative; overflow: hidden;
        transition: border-color 0.3s;
      }

      .time-box::before {
        content: ""; position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(120,255,191,0.3), transparent);
      }

      .time-box:hover { border-color: var(--line-hi); }

      .time-value {
        font-family: var(--font-display);
        font-size: clamp(2.8rem, 6vw, 5rem);
        line-height: 1; letter-spacing: 0.04em; margin-bottom: 10px;
        background: linear-gradient(170deg, #fff 0%, var(--green-soft) 60%, var(--green) 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 0 12px rgba(120,255,191,0.25));
      }

      .time-label {
        font-family: var(--font-mono); font-size: 9.5px;
        letter-spacing: 0.28em; text-transform: uppercase; color: var(--muted);
      }

      /* Local time display */
      .local-time {
        font-family: var(--font-mono); font-size: 10px;
        letter-spacing: 0.22em; text-transform: uppercase;
        color: var(--muted); margin-top: 16px;
        animation: fadeUp 0.6s 1.1s ease both;
      }

      .local-time span {
        color: var(--green-dim);
      }

      .note {
        font-family: var(--font-mono); font-size: 10px;
        letter-spacing: 0.24em; text-transform: uppercase;
        color: rgba(211,255,232,0.4);
        animation: fadeUp 0.6s 1.4s ease both; transition: color 0.4s;
      }

      .note.denied { color: #ff4d63; text-shadow: 0 0 10px rgba(255,77,99,0.4); }

      /* HUD corners */
      .hud-corner { position: absolute; width: 24px; height: 24px; z-index: 5; opacity: 0.5; }
      .hud-corner svg { width: 100%; height: 100%; }
      .hud-tl { top: 80px; left: 16px; }
      .hud-tr { top: 80px; right: 16px; transform: scaleX(-1); }
      .hud-bl { bottom: 16px; left: 16px; transform: scaleY(-1); }
      .hud-br { bottom: 16px; right: 16px; transform: scale(-1); }

      /* Overlay when menu open */
      .menu-backdrop {
        position: fixed; inset: 0; z-index: 9;
        display: none;
      }
      .menu-backdrop.open { display: block; }

      /* Responsive */
      @media (max-width: 860px) {
        .page { padding: 10px; }
        .shell { min-height: calc(100vh - 20px); border-radius: 18px; }
        .topbar { padding: 16px 20px; }
        .countdown { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
        .hero { padding: 28px 16px 36px; }
        .hud-corner { display: none; }
      }

      @media (max-width: 480px) {
        .hero-title { letter-spacing: 0.04em; }
        .hero-subtitle { letter-spacing: 0.18em; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="shell">
        <div class="grid-bg"></div>

        <!-- HUD corners -->
        <div class="hud-corner hud-tl"><svg viewBox="0 0 24 24" fill="none"><path d="M0 12 L0 0 L12 0" stroke="rgba(120,255,191,0.5)" stroke-width="1.5" fill="none"/></svg></div>
        <div class="hud-corner hud-tr"><svg viewBox="0 0 24 24" fill="none"><path d="M0 12 L0 0 L12 0" stroke="rgba(120,255,191,0.5)" stroke-width="1.5" fill="none"/></svg></div>
        <div class="hud-corner hud-bl"><svg viewBox="0 0 24 24" fill="none"><path d="M0 12 L0 0 L12 0" stroke="rgba(120,255,191,0.5)" stroke-width="1.5" fill="none"/></svg></div>
        <div class="hud-corner hud-br"><svg viewBox="0 0 24 24" fill="none"><path d="M0 12 L0 0 L12 0" stroke="rgba(120,255,191,0.5)" stroke-width="1.5" fill="none"/></svg></div>

        <!-- Top bar -->
        <header class="topbar">
          <div class="topbar-left">
            <!-- Burger -->
            <button class="burger" id="burgerBtn" aria-label="Menu">
              <span></span><span></span><span></span>
            </button>

            <!-- Nav dropdown -->
            <nav class="nav-menu" id="navMenu">
              <div class="nav-label">Navigation</div>
              <button class="nav-item nav-item-locked" id="enterSiteBtn">
                <span class="nav-item-icon">⬡</span>
                Enter Access Terminal
                <span class="nav-lock-badge">Locked</span>
              </button>
              <a href="/about" class="nav-item">
                <span class="nav-item-icon">◈</span>
                About
              </a>
              <a href="/allocation" class="nav-item">
                <span class="nav-item-icon">◎</span>
                Allocation Details
              </a>
              <a href="/mint" class="nav-item">
                <span class="nav-item-icon">◈</span>
                Mint Phases
              </a>
              <a href="/community" class="nav-item">
                <span class="nav-item-icon">◉</span>
                Community Round
              </a>
              <a href="/legends" class="nav-item">
                <span class="nav-item-icon">★</span>
                Legendary Viewer
              </a>
            </nav>

            <div class="brand">
              <span class="brand-logo">MIMU</span>
            </div>
          </div>

          <!-- Social icons -->
          <div style="display:flex;align-items:center;gap:12px;">
            <!-- X (Twitter) -->
            <a href="https://x.com/mimuonape" target="_blank" rel="noopener" style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;border:1px solid var(--line-hi);border-radius:8px;background:rgba(6,18,12,0.6);color:var(--muted);text-decoration:none;transition:border-color 0.2s,color 0.2s,background 0.2s;" onmouseover="this.style.borderColor='rgba(120,255,191,0.35)';this.style.color='var(--green-soft)';this.style.background='rgba(14,40,26,0.7)'" onmouseout="this.style.borderColor='var(--line-hi)';this.style.color='var(--muted)';this.style.background='rgba(6,18,12,0.6)'">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.253 5.622 5.91-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
              </svg>
            </a>
            <!-- Discord — coming soon -->
            <div style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;border:1px solid rgba(120,255,191,0.07);border-radius:8px;background:rgba(6,18,12,0.3);color:rgba(211,255,232,0.18);cursor:not-allowed;opacity:0.4;">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
              </svg>
            </div>
          </div>
        </header>

        <!-- Backdrop -->
        <div class="menu-backdrop" id="menuBackdrop"></div>

        <!-- Hero -->
        <section class="hero">
          <div class="center">
            <div class="eyebrow">Transmission Incoming</div>
            <h1 class="hero-title">MIMU<br />AWAKENS</h1>
            <div class="hero-subtitle">Activation Sequence Initiated</div>
            <div class="divider"></div>

            <div class="countdown-wrap">
              <div class="countdown-label">Countdown To Mint</div>
              <div class="countdown" id="countdown">
                <div class="time-box">
                  <div class="time-value" id="days">00</div>
                  <div class="time-label">Days</div>
                </div>
                <div class="time-box">
                  <div class="time-value" id="hours">00</div>
                  <div class="time-label">Hours</div>
                </div>
                <div class="time-box">
                  <div class="time-value" id="minutes">00</div>
                  <div class="time-label">Minutes</div>
                </div>
                <div class="time-box">
                  <div class="time-value" id="seconds">00</div>
                  <div class="time-label">Seconds</div>
                </div>
              </div>
              <div class="local-time" id="localTimeDisplay"></div>
            </div>

            <div class="note" id="statusNote">Countdown synced to your local time zone. Terminal access remains restricted.</div>
          </div>
        </section>
      </section>
    </main>

    <script>
      // April 13 2026 11:00 AM ET (EDT = UTC-4) = 15:00 UTC
      const targetDate = new Date('2026-04-13T15:00:00Z');

      const daysEl    = document.getElementById('days');
      const hoursEl   = document.getElementById('hours');
      const minutesEl = document.getElementById('minutes');
      const secondsEl = document.getElementById('seconds');
      const note      = document.getElementById('statusNote');
      const localTimeDisplay = document.getElementById('localTimeDisplay');

      function pad(n) { return String(n).padStart(2, '0'); }

      // Show the mint time in the visitor's local timezone
      function showLocalTime() {
        const localStr = targetDate.toLocaleString(undefined, {
          month: 'long', day: 'numeric', year: 'numeric',
          hour: 'numeric', minute: '2-digit',
          timeZoneName: 'short'
        });
        localTimeDisplay.innerHTML = 'Mint Date &nbsp;<span>' + localStr + '</span>';
      }

      function updateCountdown() {
        const diff = targetDate - Date.now();
        if (diff <= 0) {
          [daysEl, hoursEl, minutesEl, secondsEl].forEach(el => el.textContent = '00');
          localTimeDisplay.innerHTML = 'Mint is <span>Live</span>';
          return;
        }
        daysEl.textContent    = pad(Math.floor(diff / 86400000));
        hoursEl.textContent   = pad(Math.floor(diff / 3600000) % 24);
        minutesEl.textContent = pad(Math.floor(diff / 60000) % 60);
        secondsEl.textContent = pad(Math.floor(diff / 1000) % 60);
      }

      showLocalTime();
      updateCountdown();
      setInterval(updateCountdown, 1000);

      // Enter Access Terminal — locked
      document.getElementById('enterSiteBtn').addEventListener('click', () => {
        note.textContent = '[ ACCESS DENIED — CLEARANCE LEVEL INSUFFICIENT ]';
        note.classList.add('denied');
        closeMenu();
        setTimeout(() => {
          note.textContent = 'Countdown synced to your local time zone. Terminal access remains restricted.';
          note.classList.remove('denied');
        }, 3000);
      });

      // Burger menu
      const burgerBtn   = document.getElementById('burgerBtn');
      const navMenu     = document.getElementById('navMenu');
      const backdrop    = document.getElementById('menuBackdrop');

      function openMenu() {
        burgerBtn.classList.add('open');
        navMenu.classList.add('open');
        backdrop.classList.add('open');
      }

      function closeMenu() {
        burgerBtn.classList.remove('open');
        navMenu.classList.remove('open');
        backdrop.classList.remove('open');
      }

      burgerBtn.addEventListener('click', () => {
        navMenu.classList.contains('open') ? closeMenu() : openMenu();
      });

      backdrop.addEventListener('click', closeMenu);

      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeMenu();
      });
    </script>
  </body>

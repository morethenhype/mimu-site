<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MIMU // Mint Allocation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-0: #000a05;
        --bg-1: #010302;
        --bg-2: #04130d;
        --bg-3: #082117;
        --green: #78ffbf;
        --green-dim: #3dcc88;
        --green-soft: #d3ffe8;
        --muted: rgba(211, 255, 232, 0.52);
        --muted-hi: rgba(211, 255, 232, 0.72);
        --line: rgba(120, 255, 191, 0.13);
        --line-hi: rgba(120, 255, 191, 0.22);
        --font-mono: 'Share Tech Mono', monospace;
        --font-display: 'Bebas Neue', sans-serif;
        --font-body: 'DM Sans', sans-serif;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%;
        min-height: 100%;
        font-family: var(--font-body);
        color: var(--green-soft);
        background: var(--bg-0);
        overflow-x: hidden;
      }

      /* Scanlines */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg, transparent, transparent 3px,
          rgba(0,0,0,0.18) 3px, rgba(0,0,0,0.18) 4px
        );
        pointer-events: none;
        z-index: 1000;
        opacity: 0.45;
      }

      /* Noise grain */
      body::before {
        content: "";
        position: fixed;
        inset: -50%;
        width: 200%; height: 200%;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
        opacity: 0.028;
        pointer-events: none;
        animation: grain 0.8s steps(1) infinite;
        z-index: 999;
      }

      @keyframes grain {
        0%   { transform: translate(0,0); }
        10%  { transform: translate(-3%,-4%); }
        20%  { transform: translate(-6%,2%); }
        30%  { transform: translate(3%,-1%); }
        40%  { transform: translate(-1%,5%); }
        50%  { transform: translate(-5%,1%); }
        60%  { transform: translate(2%,-4%); }
        70%  { transform: translate(-2%,6%); }
        80%  { transform: translate(4%,3%); }
        90%  { transform: translate(-3%,-3%); }
        100% { transform: translate(0,0); }
      }

      /* Page */
      .page {
        min-height: 100vh;
        padding: 20px;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        background:
          radial-gradient(ellipse 60% 40% at 50% -10%, rgba(120,255,191,0.09) 0%, transparent 70%),
          radial-gradient(ellipse 40% 30% at 15% 85%, rgba(120,255,191,0.06) 0%, transparent 60%),
          linear-gradient(170deg, var(--bg-3) 0%, var(--bg-2) 35%, var(--bg-1) 70%, var(--bg-0) 100%);
      }

      /* Shell */
      .shell {
        width: min(1100px, 100%);
        border-radius: 24px;
        border: 1px solid var(--line);
        background: linear-gradient(170deg,
          rgba(5,18,12,0.97) 0%,
          rgba(2,9,6,0.96) 50%,
          rgba(1,5,3,0.97) 100%
        );
        overflow: hidden;
        position: relative;
        display: flex;
        flex-direction: column;
        animation: shellIn 1s ease both;
      }

      @keyframes shellIn {
        from { opacity: 0; transform: scale(0.985) translateY(12px); }
        to   { opacity: 1; transform: none; }
      }

      .shell::before {
        content: "";
        position: absolute;
        inset: 1px;
        border-radius: 23px;
        border: 1px solid rgba(120,255,191,0.06);
        pointer-events: none;
        z-index: 1;
      }

      .shell::after {
        content: "";
        position: absolute;
        top: 0; left: 0;
        width: 320px; height: 320px;
        background: radial-gradient(circle at top left, rgba(120,255,191,0.06), transparent 65%);
        pointer-events: none;
        z-index: 0;
      }

      /* Grid bg */
      .grid-bg {
        position: absolute; inset: 0;
        background-image:
          linear-gradient(rgba(120,255,191,0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(120,255,191,0.035) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, black 10%, transparent 80%);
        pointer-events: none;
        z-index: 0;
      }

      /* Topbar */
      .topbar {
        position: relative; z-index: 10;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        padding: 18px 28px;
        border-bottom: 1px solid var(--line);
        background: rgba(2,10,6,0.7);
        backdrop-filter: blur(6px);
        animation: barIn 0.8s 0.2s ease both;
      }

      @keyframes barIn {
        from { opacity: 0; transform: translateY(-8px); }
        to   { opacity: 1; transform: none; }
      }

      .brand {
        display: flex; align-items: center; gap: 10px;
        font-family: var(--font-mono);
        font-size: 11px; letter-spacing: 0.18em;
        color: var(--muted);
      }

      .brand-logo {
        font-family: var(--font-display);
        font-size: 22px; letter-spacing: 0.12em;
        color: var(--green); line-height: 1;
        text-shadow: 0 0 16px rgba(120,255,191,0.5);
      }

      .brand-sep {
        width: 1px; height: 16px;
        background: var(--line-hi); margin: 0 4px;
      }

      .pulse-dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 10px rgba(120,255,191,0.9), 0 0 20px rgba(120,255,191,0.4);
        animation: pulse 2.4s ease-in-out infinite;
        flex-shrink: 0;
      }

      @keyframes pulse {
        0%,100% { opacity:1; box-shadow: 0 0 10px rgba(120,255,191,0.9), 0 0 20px rgba(120,255,191,0.4); }
        50%      { opacity:0.5; box-shadow: 0 0 4px rgba(120,255,191,0.4); }
      }

      .back-link {
        font-family: var(--font-mono);
        font-size: 10px; letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--muted); text-decoration: none;
        transition: color 0.2s;
      }

      .back-link:hover { color: var(--green-soft); }

      /* Content */
      .content {
        position: relative; z-index: 2;
        padding: 52px 40px 64px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
      }

      /* Header */
      .eyebrow {
        font-family: var(--font-mono);
        font-size: 10.5px; letter-spacing: 0.36em;
        text-transform: uppercase; color: var(--muted);
        margin-bottom: 16px;
        display: flex; align-items: center; gap: 12px;
        animation: fadeUp 0.7s 0.4s ease both;
      }

      .eyebrow::before, .eyebrow::after {
        content: ""; display: block;
        height: 1px; width: 40px;
        background: linear-gradient(90deg, transparent, var(--line-hi));
      }
      .eyebrow::after { background: linear-gradient(270deg, transparent, var(--line-hi)); }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: none; }
      }

      .page-title {
        font-family: var(--font-display);
        font-size: clamp(3rem, 7vw, 6rem);
        line-height: 0.9; letter-spacing: 0.1em;
        text-transform: uppercase; margin-bottom: 10px;
        background: linear-gradient(170deg, #fff 0%, var(--green-soft) 40%, var(--green) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 0 24px rgba(120,255,191,0.2));
        animation: titleIn 0.9s 0.5s cubic-bezier(0.16,1,0.3,1) both;
      }

      @keyframes titleIn {
        from { opacity: 0; transform: translateY(28px) scaleY(0.92); }
        to   { opacity: 1; transform: none; }
      }

      .page-sub {
        font-family: var(--font-display);
        font-size: clamp(1rem, 2vw, 1.6rem);
        letter-spacing: 0.3em; text-transform: uppercase;
        color: var(--green-dim);
        text-shadow: 0 0 14px rgba(61,204,136,0.4);
        margin-bottom: 36px;
        animation: fadeUp 0.7s 0.7s ease both;
      }

      .divider {
        width: 100%; max-width: 500px; height: 1px;
        background: linear-gradient(90deg, transparent, var(--line-hi) 20%, var(--green) 50%, var(--line-hi) 80%, transparent);
        margin-bottom: 48px;
        animation: fadeUp 0.6s 0.8s ease both;
      }

      /* Chart container */
      .chart-wrap {
        width: 100%; max-width: 860px;
        border: 1px solid var(--line-hi);
        border-radius: 24px;
        background: linear-gradient(160deg, rgba(8,24,16,0.85) 0%, rgba(2,10,6,0.9) 100%);
        padding: 12px;
        position: relative;
        overflow: hidden;
        animation: fadeUp 0.8s 0.9s ease both;
        box-shadow: 0 0 60px rgba(120,255,191,0.05), inset 0 0 40px rgba(120,255,191,0.03);
        margin-bottom: 40px;
      }

      .chart-wrap::before {
        content: "";
        position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(120,255,191,0.3), transparent);
      }

      .chart-wrap img {
        width: 100%; height: auto;
        display: block;
        border-radius: 16px;
      }

      /* Allocation breakdown table */
      .breakdown {
        width: 100%; max-width: 860px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 12px;
        animation: fadeUp 0.8s 1s ease both;
      }

      .alloc-row {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 18px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: linear-gradient(160deg, rgba(6,18,12,0.8), rgba(2,9,6,0.85));
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      .alloc-row:hover {
        border-color: var(--line-hi);
        box-shadow: 0 0 20px rgba(120,255,191,0.06);
      }

      .alloc-dot {
        width: 10px; height: 10px;
        border-radius: 50%; flex-shrink: 0;
      }

      .alloc-name {
        font-family: var(--font-mono);
        font-size: 10px; letter-spacing: 0.2em;
        text-transform: uppercase; color: var(--muted-hi);
        flex: 1;
      }

      .alloc-pct {
        font-family: var(--font-display);
        font-size: 1.4rem; letter-spacing: 0.06em;
        background: linear-gradient(160deg, #fff 0%, var(--green) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Footer */
      .shell-footer {
        position: relative; z-index: 10;
        display: flex; justify-content: space-between;
        align-items: center; gap: 16px;
        padding: 15px 28px;
        border-top: 1px solid var(--line);
        background: rgba(2,10,6,0.7);
        backdrop-filter: blur(6px);
        flex-wrap: wrap;
      }

      .footer-text {
        font-family: var(--font-mono);
        font-size: 9px; letter-spacing: 0.24em;
        text-transform: uppercase;
        color: rgba(211,255,232,0.3);
      }

      @media (max-width: 700px) {
        .page { padding: 10px; }
        .shell { border-radius: 18px; }
        .content { padding: 32px 18px 44px; }
        .topbar { flex-direction: row; align-items: center; gap: 10px; padding: 14px 16px; flex-wrap: nowrap; }
      }
    </style>
  </head>

        <header class="topbar">

        </header>
